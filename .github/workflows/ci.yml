name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: 1.7.12
  BUN_VERSION: 1.3.13

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint

      - name: Lint workflows
        run: ./actionlint

  release-scope:
    name: Release artifact scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      package: ${{ steps.scope.outputs.package }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release artifact scope
        id: scope
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ]; then
            printf 'package=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" = 'pull_request' ]; then
            printf 'package=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force
          previous_tag="$(git describe --tags --match 'v[0-9]*' --abbrev=0 "${TARGET_SHA}^" 2>/dev/null || true)"

          if [ -z "$previous_tag" ]; then
            printf 'package=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$previous_tag".."$TARGET_SHA")"
          has_release_artifact_input_change=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue

            case "$path" in
              .env.example|config.example.ini|bun.lock|bunfig.toml|package.json|src/*|gui/*|scripts/release/*|tsconfig*.json)
                has_release_artifact_input_change=true
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          printf 'package=%s\n' "$has_release_artifact_input_change" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck:all

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test:coverage

  build:
    name: GUI build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [lint, typecheck, test, release-scope]
    if: github.event_name == 'pull_request' || needs.release-scope.outputs.package == 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build GUI
        run: bun run build

      - name: Upload GUI build output
        if: needs.release-scope.outputs.package == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: stream-sync-gui-dist
          path: gui/dist
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [workflow-lint, build, release-scope]
    if: needs.release-scope.outputs.package == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            script: build:release:linux
            artifact-name: stream-sync-linux-x64
            archive-path: dist/release/stream-sync-linux-x64.tar.gz
          - name: Windows x64
            os: ubuntu-24.04
            script: build:release:windows
            artifact-name: stream-sync-windows-x64
            archive-path: dist/release/stream-sync-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download GUI build output
        uses: actions/download-artifact@v8
        with:
          name: stream-sync-gui-dist
          path: gui/dist

      - name: Build release package directory
        env:
          STREAM_SYNC_REUSE_GUI_DIST: 'true'
        run: bun run ${{ matrix.script }}

      - name: Smoke test Linux binary
        if: matrix.script == 'build:release:linux'
        run: ./dist/release/stream-sync-linux-x64/stream-sync --help

      - name: Smoke test Windows binary
        if: matrix.script == 'build:release:windows'
        run: test -f ./dist/release/stream-sync-windows-x64/stream-sync.exe

      - name: Archive Linux package
        if: matrix.script == 'build:release:linux'
        run: tar -czf dist/release/stream-sync-linux-x64.tar.gz -C dist/release stream-sync-linux-x64

      - name: Archive Windows package
        if: matrix.script == 'build:release:windows'
        run: cd dist/release && zip -r stream-sync-windows-x64.zip stream-sync-windows-x64

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.archive-path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
